lm_studio:
  base_url: "http://192.168.1.8:1234/v1"    # Update to your server, or `null` for default
  model: "mistralai/devstral-small-2-2512"  # Or whatever model you wish to use
  api_key: null                             # If authentication is required
  max_tokens: 45000                         # The number of tokens available in the context

embeddings:
  enabled: false
  model: "text-embedding-nomic-embed-text-v1.5"
  dimension: 768  # Should match your embedding model's output size
  index_path: ".code_assistant_index"
  include_paths:
    - "main.py"
    - "lms_cli"
    - "tests"
  exclude_paths: # Optionally exclude these files and folders even if in the included_paths
    - "lms_cli/core/embedding_manager_faiss.py"
    - "lms_cli/tools"
  exclude_patterns: # Exclude any files and folders matching these patterns, like .gitignore
    - "embedding_manager_faiss.py"

agent:
  system_message: "You are a coding assistant. You can use tools to interact with \
this workspace. Be precise, avoid flattery, write maintainable code following the code \
standard in the example files you are provided, if any. The current task is to \
implement an OpenAI API compatible AI CLI tool. Focus on the last message in a request \
and merely use the earlier messages for context, not something to respond to. When \
asked to carry out anything but simple tasks, start with writing an overview, then \
flesh out a more detailed step-by-step plan before beginning solving the task. Before \
each step reason about how to solve it before starting. After each step is completed, \
state what the remaining goals are and then continue with the next step. "

tools:
  tools_folder: "lms_cli/tools"
  tools_settings:
    - name: "file_search"
      permission_required: true
    - name: "write_file"
      permission_required: true
    - name: "read_file"
      permission_required: true
      allow_outside_workspace: true
    - name: "run_test"
      permission_required: true
    - name: "generate_uuid"
      # This is safe to run
      permission_required: false
      disabled: true
